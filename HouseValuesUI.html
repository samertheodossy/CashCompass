<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial, sans-serif; margin: 12px; color: #1f2937; }
    label { display:block; margin-top:10px; font-weight:bold; font-size:12px; }
    input, select, button {
      width:100%;
      padding:8px;
      margin-top:4px;
      box-sizing:border-box;
      border:1px solid #cbd5e1;
      border-radius:6px;
      font-size:13px;
    }
    button {
      margin-top:12px;
      background:#1f4e78;
      color:white;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }
    .status { margin-top:10px; font-size:12px; white-space:pre-wrap; }
    .error { color:#991b1b; }
    .info {
      background:#eef6ff;
      border:1px solid #cfe3ff;
      border-radius:6px;
      padding:10px;
      margin:12px 0;
      font-size:12px;
      line-height:1.5;
    }
    .muted { color:#475569; }
  </style>
</head>
<body>

<h3>Update House Value</h3>

<label>House</label>
<select id="house" onchange="loadSelectedHouseData()"></select>

<label>Date</label>
<input type="date" id="date" onchange="loadSelectedHouseData()">

<div class="info">
  <div><strong>Selected month:</strong> <span id="selectedMonth" class="muted">—</span></div>
  <div><strong>Stored value for selected month:</strong> <span id="selectedMonthValue" class="muted">—</span></div>
  <div><strong>Current House Assets value:</strong> <span id="currentAssetValue" class="muted">—</span></div>
  <div><strong>Property type:</strong> <span id="propertyType" class="muted">—</span></div>
  <div><strong>Loan amount left:</strong> <span id="loanAmountLeft" class="muted">—</span></div>
</div>

<label>Value</label>
<input type="text" id="value" inputmode="decimal" onfocus="handleValueFocus()" onblur="handleValueBlur()">

<button onclick="save()">Save</button>

<div id="status" class="status"></div>

<script>
function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg || '';
  el.className = isError ? 'status error' : 'status';
}

function toNumber(value) {
  if (value === '' || value === null || value === undefined) return 0;
  const cleaned = String(value)
    .replace(/\$/g, '')
    .replace(/,/g, '')
    .replace(/\s+/g, '')
    .trim();
  if (!cleaned) return 0;
  const num = Number(cleaned);
  return isNaN(num) ? NaN : num;
}

function fmtCurrency(value) {
  if (value === '' || value === null || value === undefined) return '—';
  const num = Number(value);
  if (isNaN(num)) return '—';
  return '$' + num.toLocaleString('en-US', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function setCurrencyInputValue(value) {
  const input = document.getElementById('value');
  if (value === '' || value === null || value === undefined) {
    input.value = '';
    return;
  }

  const num = Number(value);
  if (isNaN(num)) {
    input.value = '';
    return;
  }

  input.value = fmtCurrency(num);
}

function handleValueFocus() {
  const input = document.getElementById('value');
  const num = toNumber(input.value);

  if (input.value === '') return;
  if (isNaN(num)) return;

  input.value = String(num);
}

function handleValueBlur() {
  const input = document.getElementById('value');
  const raw = String(input.value || '').trim();

  if (!raw) {
    input.value = '';
    return;
  }

  const num = toNumber(raw);
  if (isNaN(num)) return;

  input.value = fmtCurrency(num);
}

function setHouseInfo(data) {
  document.getElementById('selectedMonth').textContent =
    data && data.selectedMonth ? data.selectedMonth : '—';

  document.getElementById('selectedMonthValue').textContent =
    data && data.selectedMonthValue !== '' ? fmtCurrency(data.selectedMonthValue) : '—';

  document.getElementById('currentAssetValue').textContent =
    data && data.currentAssetValue !== '' ? fmtCurrency(data.currentAssetValue) : '—';

  document.getElementById('propertyType').textContent =
    data && data.propertyType ? String(data.propertyType) : '—';

  document.getElementById('loanAmountLeft').textContent =
    data && data.loanAmountLeft !== '' ? fmtCurrency(data.loanAmountLeft) : '—';

  if (data && data.selectedMonthValue !== '' && data.selectedMonthValue !== null) {
    setCurrencyInputValue(data.selectedMonthValue);
  } else {
    document.getElementById('value').value = '';
  }
}

function loadHouses() {
  google.script.run
    .withSuccessHandler(function(data) {
      const sel = document.getElementById('house');
      sel.innerHTML = '<option value=""></option>';
      (data.houses || []).forEach(function(h) {
        const opt = document.createElement('option');
        opt.value = h;
        opt.textContent = h;
        sel.appendChild(opt);
      });
    })
    .withFailureHandler(function(err) {
      setStatus((err.message || String(err)), true);
    })
    .getHouseUiData();
}

function loadSelectedHouseData() {
  const house = document.getElementById('house').value;
  const date = document.getElementById('date').value;

  if (!house || !date) {
    setHouseInfo(null);
    return;
  }

  setStatus('Loading selected month value...', false);

  google.script.run
    .withSuccessHandler(function(data) {
      setHouseInfo(data);
      setStatus('', false);
    })
    .withFailureHandler(function(err) {
      setStatus((err.message || String(err)), true);
    })
    .getHouseValueForDate(house, date);
}

function save() {
  const rawValue = document.getElementById('value').value;
  const numericValue = toNumber(rawValue);

  if (String(rawValue || '').trim() && isNaN(numericValue)) {
    setStatus('Value must be a valid number.', true);
    return;
  }

  const payload = {
    house: document.getElementById('house').value,
    valuationDate: document.getElementById('date').value,
    currentValue: numericValue
  };

  setStatus('Saving…', false);

  google.script.run
    .withSuccessHandler(function(res) {
      setStatus(res.message || 'Saved.');
      loadSelectedHouseData();
    })
    .withFailureHandler(function(err) {
      setStatus((err.message || String(err)), true);
    })
    .updateHouseValueByDate(payload);
}

document.getElementById('date').value = new Date().toISOString().slice(0, 10);
loadHouses();
</script>

</body>
</html>
